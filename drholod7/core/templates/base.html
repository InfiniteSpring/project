{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page_title %}{{ page_title }}{% endif %}</title>

</head>
<body>
    {% if page_title %}
        <div class="container">
            <h1>{{ page_title }}</h1>
        </div>
    {% endif %}

    <div class="container my-4">
        {% if not user.is_authenticated %}
            <a href="{% url 'login' %}">Вход</a> | <a href="{% url 'signup' %}">Регистрация</a>
        {% else %}
            Привет, {{ user.username }} | <a href="{% url 'logout' %}">Выйти</a>
        {% endif %}
    </div>

    {% block content %}{% endblock %}

</body>
</html>
