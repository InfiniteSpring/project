{% extends 'main/header.html' %}

{% block content %}      

{% load crispy_forms_tags %}

<!--Login--> 
<div class="container py-5">
  <h1>Login</h1>
  <form method="POST">
    {% csrf_token %}
    {{ login_form|crispy }}
    <button class="btn btn-primary" type="submit">Войти</button>
  </form>
  <p class="text-center">Ещё нет аккаунта? <a href="/register">Создайте прямо сейчас!</a>.</p>
</div>

{% endblock %}
